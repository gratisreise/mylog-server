plugins {
    id 'org.springframework.boot' version '3.2.5'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'jacoco'
    id 'java'
}

group = 'com'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot Starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    //Spring Cloud
    implementation 'org.springframework.cloud:spring-cloud-starter-openfeign'
    // OpenFeign HTTP Client (Apache HttpClient 기반)
    implementation 'io.github.openfeign:feign-httpclient:12.3'
    implementation "io.github.openfeign.form:feign-form:3.8.0"
    implementation "io.github.openfeign.form:feign-form-spring:3.8.0"

    // Database
    implementation 'org.postgresql:postgresql:42.7.3'
    runtimeOnly 'com.h2database:h2:2.2.224'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

    // AWS S3
    implementation 'software.amazon.awssdk:s3:2.25.16'

    // Sentry
    implementation 'io.sentry:sentry-spring-boot-starter-jakarta:8.19.0'

    // Swagger (Springdoc OpenAPI)
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.5.0'

    // Monitoring
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.32'
    annotationProcessor 'org.projectlombok:lombok:1.18.32'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

ext {
    set('springCloudVersion', "2023.0.5")
}


dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}


jacocoTestReport {
    reports {
        html.required = true
        xml.required = true
        csv.required = false
    }

    getClassDirectories().setFrom(files(classDirectories.files.collect {
        fileTree(dir: it, exclude: ['**/dto/**', '**/entity/**',
                                    '**/MylogApplication',
                                    '**/config/**', '**/enums/**', '**/common/**'])
    }))
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            enabled = true
            element = 'CLASS'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.80 // 예시: 라인 커버리지 80% 이상 요구
            }
        }
    }
}