spring:

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update #자동생성
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost      # Redis 서버 주소
      port: 6379          # Redis 포트
      password: ${REDIS_PASSWORD}        # 비밀번호 (설정한 경우)
      database: 0         # Redis DB 번호 (0~15)

jwt:
  access_secret: ${ACCESS_TOKEN_SECRET}
  access_expiration: 86400000  # 1hours
  refresh_secret: ${REFRESH_TOKEN_SECRET}
  refresh_expiration: 604800000 #1주

oauth2:
  client:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:3000
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      redirect-uri: http://localhost:3000
    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET}
      redirect-uri: http://localhost:3000

sentry:
  dsn: ${SENTRY_DSN_DEV}
  environment: development

# aws.s3.bucket
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: mylog-imgsource
      basic: https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/5162d5b3-266b-4aae-bc16-d7f10fc4b2f1_basic.png


management:
  endpoints:
    web:
      exposure:
        include: "*"