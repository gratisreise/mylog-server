spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/postgres
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update #자동생성
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: redis
      port: 6379
sentry:
  dsn: ${SENTRY_DSN}
  environment: development

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true