openapi: 3.0.3
info:
  title: Category API
  description: MyLog Category Management API
  version: 1.0.0
  contact:
    name: MyLog API

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.mylog.com
    description: Production server

security:
  - bearerAuth: []

paths:
  /api/categories:
    post:
      tags:
        - Category
      summary: 카테고리 생성
      description: 인증된 사용자의 새로운 카테고리를 생성합니다.
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
            examples:
              valid:
                summary: Valid category name
                value:
                  categoryName: "개발"
      responses:
        '200':
          description: 카테고리 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: 1
                message: "성공하였습니다."
                data: null
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -4
                message: "잘못된 데이터"
                data: null
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -5
                message: "권한 없음"
                data: null

    get:
      tags:
        - Category
      summary: 카테고리 목록 조회
      description: 인증된 사용자의 모든 카테고리 목록을 조회합니다.
      operationId: getCategories
      responses:
        '200':
          description: 카테고리 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListResult'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategoryResponse'
              example:
                code: 1
                message: "성공하였습니다."
                data:
                  - id: 1
                    categoryName: "개발"
                    memberId: 1
                  - id: 2
                    categoryName: "일상"
                    memberId: 1
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'

  /api/categories/{categoryId}:
    put:
      tags:
        - Category
      summary: 카테고리 수정
      description: 지정된 ID의 카테고리 이름을 수정합니다. 자신의 카테고리만 수정할 수 있습니다.
      operationId: updateCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          description: 수정할 카테고리 ID
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
            examples:
              valid:
                summary: Valid category update
                value:
                  categoryName: "프로그래밍"
      responses:
        '200':
          description: 카테고리 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: 1
                message: "성공하였습니다."
                data: null
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
        '404':
          description: 카테고리를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'

    delete:
      tags:
        - Category
      summary: 카테고리 삭제
      description: 지정된 ID의 카테고리를 삭제합니다. 자신의 카테고리만 삭제할 수 있습니다.
      operationId: deleteCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          description: 삭제할 카테고리 ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: 카테고리 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: 1
                message: "성공하였습니다."
                data: null
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
        '404':
          description: 카테고리를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token required. Include 'Authorization: Bearer {token}' header."

  schemas:
    CategoryCreateRequest:
      type: object
      required:
        - categoryName
      properties:
        categoryName:
          type: string
          minLength: 1
          maxLength: 12
          description: 카테고리 이름
          example: "개발"

    CategoryUpdateRequest:
      type: object
      required:
        - categoryName
      properties:
        categoryName:
          type: string
          minLength: 1
          description: 수정할 카테고리 이름
          example: "프로그래밍"

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 카테고리 ID
          example: 1
        categoryName:
          type: string
          description: 카테고리 이름
          example: "개발"
        memberId:
          type: integer
          format: int64
          description: 소유자 회원 ID
          example: 1

    CommonResult:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (1: 성공, -1: 실패, -2: 중복, -3: 누락, -4: 무효, -5: 권한 없음)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: "성공하였습니다."
        data:
          type: object
          nullable: true
          description: 응답 데이터 (성공 시 null)
          example: null

    ListResult:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (1: 성공, -1: 실패, -2: 중복, -3: 누락, -4: 무효, -5: 권한 없음)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: "성공하였습니다."
        data:
          type: array
          description: 응답 데이터 목록
          items:
            type: object

tags:
  - name: Category
    description: 카테고리 관리 API
