openapi: 3.0.3
info:
  title: MyLog Auth API
  description: MyLog 인증 관련 API 명세서
  version: 1.0.0
  contact:
    name: MyLog Team

servers:
  - url: http://localhost:8080
    description: 로컬 개발 서버
  - url: https://api.mylog.com
    description: 프로덕션 서버

tags:
  - name: Auth
    description: 인증 관련 API

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 회원가입
      description: 이메일 기반 회원가입을 진행합니다.
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
            examples:
              example1:
                summary: 회원가입 요청 예시
                value:
                  email: user@example.com
                  memberName: 홍길동
                  password: Password123!
      responses:
        '200':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: 1
                message: 성공하였습니다.
        '400':
          description: 잘못된 요청 (유효성 검증 실패)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -4
                message: 잘못된 데이터입니다.
        '409':
          description: 중복된 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -2
                message: 이미 존재하는 이메일입니다.

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 이메일 로그인
      description: 이메일과 비밀번호로 로그인하여 JWT 토큰을 발급받습니다.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                summary: 로그인 요청 예시
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                code: 1
                message: 성공하였습니다.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: 인증 실패 (잘못된 이메일 또는 비밀번호)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -1
                message: 이메일 또는 비밀번호가 일치하지 않습니다.

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 로그아웃
      description: 현재 사용자를 로그아웃 처리하고 리프레시 토큰을 무효화합니다.
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: 1
                message: 성공하였습니다.
        '401':
          description: 인증되지 않은 사용자
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -5
                message: 권한이 없습니다.

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 리프레시
      description: 리프레시 토큰을 사용하여 새로운 액세스 토큰을 발급받습니다.
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              example1:
                summary: 토큰 리프레시 요청 예시
                value:
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  provider: LOCAL
      responses:
        '200':
          description: 토큰 리프레시 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              example:
                code: 1
                message: 성공하였습니다.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: 유효하지 않은 리프레시 토큰
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -1
                message: 유효하지 않은 리프레시 토큰입니다.

  /api/auth/oauth/login:
    post:
      tags:
        - Auth
      summary: 소셜 로그인
      description: OAuth2 인증 코드를 사용하여 소셜 로그인을 진행하고 JWT 토큰을 발급받습니다.
      operationId: socialLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRequest'
            examples:
              google:
                summary: Google 소셜 로그인
                value:
                  code: 4/0AX4XfWj...
                  provider: GOOGLE
                  state: random_state_string
              kakao:
                summary: Kakao 소셜 로그인
                value:
                  code: abc123def456...
                  provider: KAKAO
                  state: random_state_string
              naver:
                summary: Naver 소셜 로그인
                value:
                  code: naver_auth_code...
                  provider: NAVER
                  state: random_state_string
      responses:
        '200':
          description: 소셜 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                code: 1
                message: 성공하였습니다.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: 잘못된 요청 (유효하지 않은 provider 또는 code)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -4
                message: 지원하지 않는 OAuth 제공자입니다.
        '401':
          description: OAuth 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: -1
                message: OAuth 인증에 실패했습니다.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 액세스 토큰

  schemas:
    SignUpRequest:
      type: object
      required:
        - email
        - memberName
        - password
      properties:
        email:
          type: string
          format: email
          description: 사용자 이메일
          minLength: 8
          maxLength: 30
          example: user@example.com
        memberName:
          type: string
          description: 사용자 이름
          minLength: 3
          maxLength: 30
          example: 홍길동
        password:
          type: string
          format: password
          description: 비밀번호 (8-20자, 영문+숫자+특수문자 조합)
          minLength: 8
          maxLength: 20
          example: Password123!

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: 사용자 이메일
          minLength: 8
          maxLength: 30
          example: user@example.com
        password:
          type: string
          format: password
          description: 비밀번호
          minLength: 8
          maxLength: 20
          example: Password123!

    RefreshRequest:
      type: object
      required:
        - refreshToken
        - provider
      properties:
        refreshToken:
          type: string
          description: 리프레시 토큰
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        provider:
          type: string
          enum:
            - LOCAL
            - SOCIAL
            - GOOGLE
            - KAKAO
            - NAVER
          description: OAuth 제공자 타입
          example: LOCAL

    OAuthRequest:
      type: object
      required:
        - code
        - provider
        - state
      properties:
        code:
          type: string
          description: OAuth2 인증 코드
          example: 4/0AX4XfWj...
        provider:
          type: string
          enum:
            - GOOGLE
            - KAKAO
            - NAVER
          description: OAuth 제공자
          example: GOOGLE
        state:
          type: string
          description: CSRF 방지용 상태 값
          example: random_state_string

    CommonResult:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (1은 성공, 음수는 실패)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: 성공하였습니다.

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (1은 성공, 음수는 실패)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: 성공하였습니다.
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: JWT 액세스 토큰
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refreshToken:
              type: string
              description: JWT 리프레시 토큰
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    RefreshResponse:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (1은 성공, 음수는 실패)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: 성공하였습니다.
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: 새로 발급된 JWT 액세스 토큰
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
