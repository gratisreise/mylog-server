openapi: 3.0.3
info:
  title: MyLog Article API
  description: 게시글 관리 API 명세서
  version: 1.0.0
  contact:
    name: MyLog Team

servers:
  - url: http://localhost:8080
    description: Development Server
  - url: https://api.mylog.com
    description: Production Server

tags:
  - name: Article
    description: 게시글 관리

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CommonResult:
      type: object
      properties:
        code:
          type: string
          example: "1"
          description: "응답 코드 (1은 성공, -1은 실패)"
        message:
          type: string
          example: "success"
          description: 응답 메시지

    ArticleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 게시글 ID
          example: 1
        title:
          type: string
          description: 게시글 제목
          example: "첫 게시글"
        content:
          type: string
          description: 게시글 내용
          example: "이것은 첫 게시글의 내용입니다."
        author:
          type: string
          description: 작성자 이름
          example: "홍길동"
        category:
          type: string
          description: 카테고리명
          example: "일상"
        articleImg:
          type: string
          format: uri
          description: 게시글 이미지 URL
          example: "https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/article/image.jpg"
          nullable: true
        tags:
          type: array
          description: 태그 목록
          items:
            type: string
          example: ["여행", "맛집"]
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2025-01-24T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: 수정일시
          example: "2025-01-24T10:30:00"

    PageResponse_ArticleResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ArticleResponse'
        page:
          type: integer
          description: 현재 페이지 번호
          example: 0
        size:
          type: integer
          description: 페이지당 항목 수
          example: 20
        totalElements:
          type: integer
          format: int64
          description: 전체 항목 수
          example: 100
        totalPages:
          type: integer
          description: 전체 페이지 수
          example: 5
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
          example: true
        hasPrevious:
          type: boolean
          description: 이전 페이지 존재 여부
          example: false

    SingleResult_ArticleResponse:
      type: object
      properties:
        code:
          type: string
          example: "1"
        message:
          type: string
          example: "success"
        data:
          $ref: '#/components/schemas/ArticleResponse'

    SingleResult_PageResponse:
      type: object
      properties:
        code:
          type: string
          example: "1"
        message:
          type: string
          example: "success"
        data:
          $ref: '#/components/schemas/PageResponse_ArticleResponse'

    ArticleCreateRequest:
      type: object
      required:
        - title
        - content
        - category
        - tagNames
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 30
          description: 게시글 제목 (5-30자)
          example: "나의 첫 블로그 포스트"
        content:
          type: string
          minLength: 10
          maxLength: 3000
          description: 게시글 내용 (10-3000자)
          example: "이것은 나의 첫 블로그 포스트 내용입니다."
        category:
          type: string
          description: 카테고리명
          example: "일상"
        tagNames:
          type: array
          description: 태그 이름 목록
          items:
            type: string
          example: ["여행", "맛집", "일기"]

    ArticleUpdateRequest:
      type: object
      required:
        - title
        - content
        - category
        - author
      properties:
        title:
          type: string
          minLength: 2
          maxLength: 30
          description: 게시글 제목 (2-30자)
          example: "수정된 제목"
        content:
          type: string
          minLength: 2
          maxLength: 3000
          description: 게시글 내용 (2-3000자)
          example: "수정된 내용"
        category:
          type: string
          minLength: 2
          maxLength: 12
          description: 카테고리명 (2-12자)
          example: "여행"
        author:
          type: string
          description: 작성자 이름
          example: "홍길동"
        tagNames:
          type: array
          description: 태그 이름 목록 (선택사항)
          items:
            type: string
          example: ["해외여행"]

paths:
  /api/articles:
    post:
      tags:
        - Article
      summary: 게시글 생성
      description: 새로운 게시글을 생성합니다. 이미지 파일과 함께 전송해야 합니다.
      operationId: createArticle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - request
              properties:
                file:
                  type: string
                  format: binary
                  description: 게시글 이미지 파일
                request:
                  type: string
                  format: json
                  description: 게시글 생성 정보 (JSON 문자열)
                  schema:
                    $ref: '#/components/schemas/ArticleCreateRequest'
      responses:
        '200':
          description: 게시글 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "1"
                message: "success"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "-1"
                message: "인증되지 않은 요청입니다."
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'

  /api/articles/{articleId}:
    put:
      tags:
        - Article
      summary: 게시글 수정
      description: 기존 게시글을 수정합니다. 이미지는 선택적으로 전송할 수 있습니다.
      operationId: updateArticle
      security:
        - BearerAuth: []
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - request
              properties:
                file:
                  type: string
                  format: binary
                  description: 게시글 이미지 파일 (선택사항)
                request:
                  type: string
                  format: json
                  description: 게시글 수정 정보 (JSON 문자열)
                  schema:
                    $ref: '#/components/schemas/ArticleUpdateRequest'
      responses:
        '200':
          description: 게시글 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "1"
                message: "success"
        '401':
          description: 인증 실패
        '403':
          description: 권한 없음 (본인의 게시글만 수정 가능)
        '404':
          description: 게시글을 찾을 수 없음
        '400':
          description: 잘못된 요청

    delete:
      tags:
        - Article
      summary: 게시글 삭제
      description: 게시글을 삭제합니다. 본인의 게시글만 삭제할 수 있습니다.
      operationId: deleteArticle
      security:
        - BearerAuth: []
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: 게시글 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "1"
                message: "success"
        '401':
          description: 인증 실패
        '403':
          description: 권한 없음 (본인의 게시글만 삭제 가능)
        '404':
          description: 게시글을 찾을 수 없음

    get:
      tags:
        - Article
      summary: 게시글 상세 조회
      description: 특정 게시글의 상세 정보를 조회합니다.
      operationId: getArticle
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: 게시글 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_ArticleResponse'
              example:
                code: "1"
                message: "success"
                data:
                  id: 1
                  title: "첫 게시글"
                  content: "이것은 첫 게시글의 내용입니다."
                  author: "홍길동"
                  category: "일상"
                  articleImg: "https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/article/image.jpg"
                  tags: ["여행", "맛집"]
                  createdAt: "2025-01-24T10:30:00"
                  updatedAt: "2025-01-24T10:30:00"
        '404':
          description: 게시글을 찾을 수 없음

  /api/articles/all:
    get:
      tags:
        - Article
      summary: 전체 게시글 목록 조회
      description: 모든 사용자의 게시글 목록을 페이지네이션으로 조회합니다.
      operationId: getAllArticles
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: 정렬 필드
          schema:
            type: string
            default: "id"
          example: "id,createdAt"
      responses:
        '200':
          description: 게시글 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_PageResponse'

  /api/articles/me:
    get:
      tags:
        - Article
      summary: 내 게시글 목록 조회
      description: 현재 로그인한 사용자의 게시글 목록을 페이지네이션으로 조회합니다.
      operationId: getMyArticles
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: 정렬 필드 (기본값은 id 오름차순)
          schema:
            type: string
            default: "id,ASC"
          example: "id,ASC"
      responses:
        '200':
          description: 내 게시글 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_PageResponse'
        '401':
          description: 인증 실패

  /api/articles/all/search:
    get:
      tags:
        - Article
      summary: 전체 게시글 검색
      description: 모든 사용자의 게시글을 키워드나 태그로 검색합니다.
      operationId: searchAllArticles
      parameters:
        - name: keyword
          in: query
          description: 검색 키워드 (제목 또는 내용)
          schema:
            type: string
          example: "여행"
        - name: tag
          in: query
          description: 태그명으로 검색
          schema:
            type: string
          example: "맛집"
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: 정렬 필드
          schema:
            type: string
            default: "id"
      responses:
        '200':
          description: 검색 결과 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_PageResponse'

  /api/articles/me/search:
    get:
      tags:
        - Article
      summary: 내 게시글 검색
      description: 현재 로그인한 사용자의 게시글을 키워드나 태그로 검색합니다.
      operationId: searchMyArticles
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          description: 검색 키워드 (제목 또는 내용)
          schema:
            type: string
          example: "여행"
        - name: tag
          in: query
          description: 태그명으로 검색
          schema:
            type: string
          example: "맛집"
        - name: page
          in: query
          description: 페이지 번호 (0부터 시작)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: 정렬 필드
          schema:
            type: string
            default: "id"
      responses:
        '200':
          description: 검색 결과 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_PageResponse'
        '401':
          description: 인증 실패
