openapi: 3.0.3
info:
  title: MyLog Comment API
  description: 댓글 관련 API 명세서
  version: 1.0.0
  contact:
    name: MyLog API Support

servers:
  - url: http://localhost:8080
    description: Development Server
  - url: https://api.mylog.com
    description: Production Server

tags:
  - name: Comment
    description: 댓글 관리

paths:
  /articles/{articleId}/comments:
    post:
      tags:
        - Comment
      summary: 댓글 생성
      description: 특정 게시글에 댓글을 생성합니다. 인증이 필요합니다.
      operationId: createComment
      security:
        - BearerAuth: []
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
            examples:
              withoutParent:
                summary: 대댓글이 아닌 댓글
                value:
                  content: "좋은 글이네요!"
                  parentCommentId: 0
              withParent:
                summary: 대댓글
                value:
                  content: "동의합니다!"
                  parentCommentId: 10
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      tags:
        - Comment
      summary: 댓글 목록 조회
      description: 특정 게시글의 댓글 목록을 페이징하여 조회합니다. 인증이 필요하지 않습니다.
      operationId: getCommentsByArticle
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
        - name: page
          in: query
          description: "페이지 번호 (0부터 시작)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지 당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: "정렬 기준"
          schema:
            type: string
            default: createdAt
          example: createdAt
      responses:
        '200':
          description: 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResponseOfCommentResponse'

  /articles/{articleId}/comments/{parentId}:
    get:
      tags:
        - Comment
      summary: 대댓글 조회
      description: 특정 댓글의 대댓글 목록을 페이징하여 조회합니다. 인증이 필요하지 않습니다.
      operationId: getRepliesByComment
      parameters:
        - name: articleId
          in: path
          required: true
          description: 게시글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
        - name: parentId
          in: path
          required: true
          description: 부모 댓글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 10
        - name: page
          in: query
          description: "페이지 번호 (0부터 시작)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지 당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: "정렬 기준"
          schema:
            type: string
            default: createdAt
          example: createdAt
      responses:
        '200':
          description: 대댓글 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResponseOfCommentResponse'

  /comments/me:
    get:
      tags:
        - Comment
      summary: 내가 작성한 댓글 조회
      description: 현재 로그인한 사용자가 작성한 모든 댓글을 페이징하여 조회합니다. 인증이 필요합니다.
      operationId: getMyComments
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: "페이지 번호 (0부터 시작)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지 당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: "정렬 기준"
          schema:
            type: string
            default: createdAt
          example: createdAt
      responses:
        '200':
          description: 내 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResponseOfCommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /articles/me/comments:
    get:
      tags:
        - Comment
      summary: 내 게시글에 작성된 댓글 조회
      description: 현재 로그인한 사용자의 게시글에 작성된 모든 댓글을 페이징하여 조회합니다. 인증이 필요합니다.
      operationId: getCommentsOnMyArticles
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: "페이지 번호 (0부터 시작)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: 페이지 당 항목 수
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          description: "정렬 기준"
          schema:
            type: string
            default: createdAt
          example: createdAt
      responses:
        '200':
          description: 내 게시글의 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResponseOfCommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /comments/{commentId}:
    put:
      tags:
        - Comment
      summary: 댓글 수정
      description: 특정 댓글을 수정합니다. 댓글 작성자만 수정할 수 있습니다. 인증이 필요합니다.
      operationId: updateComment
      security:
        - BearerAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          description: 댓글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
            example:
              content: "수정된 댓글 내용입니다."
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Comment
      summary: 댓글 삭제
      description: 특정 댓글을 삭제합니다. 댓글 작성자만 삭제할 수 있습니다. 인증이 필요합니다.
      operationId: deleteComment
      security:
        - BearerAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          description: 댓글 ID
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 1
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Access Token (예: Bearer eyJhbGciOiJIUzI1NiIs...)"

  schemas:
    CommentCreateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: 댓글 내용
          minLength: 5
          maxLength: 200
          example: "좋은 글이네요!"
        parentCommentId:
          type: integer
          format: int64
          description: "부모 댓글 ID (대댓글인 경우), 대댓글이 아닌 경우 0 또는 null"
          default: 0
          example: 0
      example:
        content: "좋은 글이네요!"
        parentCommentId: 0

    CommentUpdateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: 수정할 댓글 내용
          minLength: 2
          maxLength: 200
          example: "수정된 댓글 내용입니다."
      example:
        content: "수정된 댓글 내용입니다."

    CommentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 댓글 ID
          example: 1
        content:
          type: string
          description: 댓글 내용
          example: "좋은 글이네요!"
        author:
          type: string
          description: 작성자 이름
          example: "홍길동"
        memberId:
          type: integer
          format: int64
          description: 작성자 회원 ID
          example: 100
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2025-01-24T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: 수정일시
          example: "2025-01-24T11:00:00"
      example:
        id: 1
        content: "좋은 글이네요!"
        author: "홍길동"
        memberId: 100
        createdAt: "2025-01-24T10:30:00"
        updatedAt: "2025-01-24T11:00:00"

    PageResponseOfCommentResponse:
      type: object
      properties:
        content:
          type: array
          description: 댓글 목록
          items:
            $ref: '#/components/schemas/CommentResponse'
        page:
          type: integer
          description: 현재 페이지 번호
          example: 0
        size:
          type: integer
          description: 페이지당 항목 수
          example: 20
        totalElements:
          type: integer
          format: int64
          description: 전체 항목 수
          example: 150
        totalPages:
          type: integer
          description: 전체 페이지 수
          example: 8
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
          example: true
        hasPrevious:
          type: boolean
          description: 이전 페이지 존재 여부
          example: false
      example:
        content:
          - id: 1
            content: "좋은 글이네요!"
            author: "홍길동"
            memberId: 100
            createdAt: "2025-01-24T10:30:00"
            updatedAt: "2025-01-24T10:30:00"
          - id: 2
            content: "동의합니다!"
            author: "김철수"
            memberId: 101
            createdAt: "2025-01-24T10:35:00"
            updatedAt: "2025-01-24T10:35:00"
        page: 0
        size: 20
        totalElements: 150
        totalPages: 8
        hasNext: true
        hasPrevious: false

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          description: "응답 코드 (성공: 1)"
          example: 1
        message:
          type: string
          description: 응답 메시지
          example: "성공하였습니다."
        data:
          type: object
          nullable: true
          description: "응답 데이터 (데이터가 없는 경우 null)"
      example:
        code: 1
        message: "성공하였습니다."
        data: null

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 에러 코드
          example: -1
        message:
          type: string
          description: 에러 메시지
          example: "에러가 발생했습니다."
        data:
          type: object
          nullable: true
          description: "에러 데이터 (없는 경우 null)"
      example:
        code: -1
        message: "에러가 발생했습니다."
        data: null

  responses:
    SuccessResponse:
      description: 요청이 성공적으로 처리됨
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

    BadRequest:
      description: "잘못된 요청 (입력값 오류)"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: 유효성 검사 실패
              value:
                code: -4
                message: "잘못된 데이터입니다."
                data: null
            duplicateError:
              summary: 중복 데이터
              value:
                code: -2
                message: "중복된 데이터입니다."
                data: null

    Unauthorized:
      description: 인증되지 않은 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: -5
            message: "권한이 없습니다."
            data: null

    Forbidden:
      description: "권한 없음 (자신의 댓글만 수정/삭제 가능)"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: -5
            message: "권한이 없습니다."
            data: null

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: -3
            message: "데이터를 찾을 수 없습니다."
            data: null
