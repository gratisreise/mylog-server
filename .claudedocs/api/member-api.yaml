openapi: 3.0.3
info:
  title: MyLog Member API
  description: 회원 정보 관리 API 명세서
  version: 1.0.0
  contact:
    name: MyLog Team

servers:
  - url: http://localhost:8080
    description: Development Server
  - url: https://api.mylog.com
    description: Production Server

tags:
  - name: Member
    description: 회원 정보 관리

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CommonResult:
      type: object
      properties:
        code:
          type: string
          description: "응답 코드 (1: 성공, -1: 실패)"
          example: "1"
        message:
          type: string
          description: 응답 메시지
          example: "성공하였습니다."

    MemberResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 회원 ID
          example: 1
        email:
          type: string
          format: email
          description: 이메일
          example: "user@example.com"
        memberName:
          type: string
          description: 회원 이름
          example: "홍길동"
        nickname:
          type: string
          description: 닉네임
          example: "길동이"
        profileImg:
          type: string
          format: uri
          description: 프로필 이미지 URL
          example: "https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/member/profile.jpg"
        bio:
          type: string
          description: 자기소개
          example: "개발자를 꿈꾸는 학생입니다."
        provider:
          type: string
          enum: [LOCAL, GOOGLE, KAKAO, NAVER]
          description: OAuth 제공자
          example: "LOCAL"
        providerId:
          type: string
          description: OAuth 제공자 ID
          example: "user@example.comLOCAL"
        createdAt:
          type: string
          format: date-time
          description: 가입일시
          example: "2025-01-24T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: 수정일시
          example: "2025-01-24T10:30:00"

    SingleResult_MemberResponse:
      allOf:
        - $ref: '#/components/schemas/CommonResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MemberResponse'

    MemberUpdateRequest:
      type: object
      required:
        - password
        - memberName
        - nickname
        - bio
      properties:
        password:
          type: string
          format: password
          description: 비밀번호 (영문+숫자+특수문자 조합)
          minLength: 8
          maxLength: 20
          example: "Password123!"
        memberName:
          type: string
          description: 회원 이름
          minLength: 3
          maxLength: 30
          example: "홍길동"
        nickname:
          type: string
          description: 닉네임
          minLength: 3
          maxLength: 30
          example: "길동이"
        bio:
          type: string
          description: 자기소개
          maxLength: 200
          example: "개발자를 꿈꾸는 학생입니다."
        imageUrl:
          type: string
          format: uri
          description: 기존 이미지 URL (이미지 변경하지 않을 때 사용)
          example: "https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/member/profile.jpg"

paths:
  /api/members/me:
    get:
      tags:
        - Member
      summary: 개인정보 조회
      description: 현재 로그인한 사용자의 개인정보를 조회합니다.
      operationId: getMember
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 개인정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResult_MemberResponse'
              example:
                code: "1"
                message: "성공하였습니다."
                data:
                  id: 1
                  email: "user@example.com"
                  memberName: "홍길동"
                  nickname: "길동이"
                  profileImg: "https://mylog-imgsource.s3.ap-northeast-2.amazonaws.com/member/profile.jpg"
                  bio: "개발자를 꿈꾸는 학생입니다."
                  provider: "LOCAL"
                  providerId: "user@example.comLOCAL"
                  createdAt: "2025-01-24T10:30:00"
                  updatedAt: "2025-01-24T10:30:00"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "-5"
                message: "권한이 없습니다."

    put:
      tags:
        - Member
      summary: 개인정보 수정
      description: 현재 로그인한 사용자의 개인정보를 수정합니다. 프로필 이미지를 변경하려면 파일을 함께 전송하세요.
      operationId: updateMember
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - request
              properties:
                file:
                  type: string
                  format: binary
                  description: 프로필 이미지 파일 (선택사항)
                request:
                  type: string
                  format: json
                  description: 회원 수정 정보 (JSON 문자열)
                  schema:
                    $ref: '#/components/schemas/MemberUpdateRequest'
            examples:
              withFile:
                summary: 프로필 이미지와 함께 수정
                value:
                  file: (binary file)
                  request: |
                    {
                      "password": "NewPassword123!",
                      "memberName": "홍길순",
                      "nickname": "길순이",
                      "bio": "업그레이드된 자기소개입니다."
                    }
              withoutFile:
                summary: 프로필 이미지 없이 수정
                value:
                  request: |
                    {
                      "password": "NewPassword123!",
                      "memberName": "홍길순",
                      "nickname": "길순이",
                      "bio": "업그레이드된 자기소개입니다."
                    }
      responses:
        '200':
          description: 개인정보 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "1"
                message: "성공하였습니다."
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "-5"
                message: "권한이 없습니다."
        '400':
          description: 잘못된 요청 (유효성 검증 실패)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "-4"
                message: "잘못된 데이터입니다."

    delete:
      tags:
        - Member
      summary: 개인정보 삭제 (회원 탈퇴)
      description: 현재 로그인한 사용자의 계정을 삭제합니다. 이 작업은 되돌릴 수 없습니다.
      operationId: deleteMember
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 회원 탈퇴 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "1"
                message: "성공하였습니다."
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResult'
              example:
                code: "-5"
                message: "권한이 없습니다."
