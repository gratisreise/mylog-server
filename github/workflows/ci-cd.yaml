name: CI/CD for MyLog with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mylog

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name != 'push' }}
      - name: Run tests
        run: ./gradlew test --parallel
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name != 'push' }}
      - name: Build application
        run: ./gradlew clean build -x test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            # Redirect logs to file
            exec &> /var/log/deployment.log

            # Initialize environment
            sudo apt update && sudo apt install -y docker.io nginx curl
            sudo systemctl start docker && sudo systemctl enable docker
            sudo usermod -aG docker ${{ secrets.EC2_USER }}
            sudo systemctl restart nginx
            docker network create nginx-network || true

            # Initialize Nginx config if not exists
            if [ ! -f /etc/nginx/sites-available/default ]; then
              sudo bash -c 'cat > /etc/nginx/sites-available/default <<EOF
            upstream mylog {
                server 127.0.0.1:8080;
            }
            server {
                listen 80;
                server_name _;
                location / {
                    proxy_pass http://mylog;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF'
              sudo nginx -t && sudo systemctl restart nginx
            fi

            # Docker login
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Health check function
            wait_for_health() {
              echo "Waiting for application to be healthy..."
              for i in {1..30}; do
                if curl -f http://localhost:8081/actuator/health >/dev/null 2>&1; then
                  echo "Application is healthy!"
                  return 0
                fi
                echo "Attempt $i/30: Application not ready yet..."
                sleep 10
              done
              echo "Application failed to become healthy"
              return 1
            }

            # Nginx health check function
            wait_for_nginx_health() {
              echo "Waiting for Nginx to serve the application..."
              for i in {1..15}; do
                if curl -f http://${{ secrets.YOUR_DOMAIN }}/actuator/health >/dev/null 2>&1; then
                  echo "Nginx is serving the application correctly!"
                  return 0
                fi
                echo "Nginx check attempt $i/15..."
                sleep 5
              done
              echo "Nginx health check failed"
              return 1
            }

            # Blue-Green deployment strategy
            OLD_CONTAINER=$(docker ps -q -f name=mylog)

            # Start new container on different port for blue-green deployment
            docker run -d --name mylog-new \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USER_NAME="${{ secrets.DB_USER_NAME }}" \
              -e DB_USER_PASSWORD="${{ secrets.DB_USER_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
              -e REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
              -e NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
              -e KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
              -e KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
              -e SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
              -p 8081:8080 \
              --network nginx-network \
              --restart unless-stopped \
              --log-driver json-file \
              --log-opt max-size=100m \
              --log-opt max-file=3 \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Wait for new container to be healthy
            if wait_for_health; then
              echo "New container is healthy, updating Nginx configuration..."

              # Update Nginx upstream to point to new container
              sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.backup
              sudo sed -i 's/server 127\.0\.0\.1:8080;/server 127.0.0.1:8081;/' /etc/nginx/sites-available/default

              if sudo nginx -t; then
                echo "Nginx config is valid, reloading..."
                sudo systemctl reload nginx

                # Perform Nginx health check after config update
                if wait_for_nginx_health; then
                  echo "Nginx successfully serving new container"

                  if [ ! -z "$OLD_CONTAINER" ]; then
                    echo "Stopping old container..."
                    docker stop mylog || true
                    docker rm mylog || true
                  fi

                  docker rename mylog-new mylog-temp

                  docker run -d --name mylog \
                    -e SPRING_PROFILES_ACTIVE=prod \
                    -e DB_URL="${{ secrets.DB_URL }}" \
                    -e DB_USER_NAME="${{ secrets.DB_USER_NAME }}" \
                    -e DB_USER_PASSWORD="${{ secrets.DB_USER_PASSWORD }}" \
                    -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
                    -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
                    -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
                    -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
                    -e ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
                    -e REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}" \
                    -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
                    -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                    -e NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
                    -e NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
                    -e KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
                    -e KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
                    -e SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
                    -p 8080:8080 \
                    --network nginx-network \
                    --restart unless-stopped \
                    --log-driver json-file \
                    --log-opt max-size=100m \
                    --log-opt max-file=3 \
                    ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

                  sudo sed -i 's/server 127\.0\.0\.1:8081;/server 127.0.0.1:8080;/' /etc/nginx/sites-available/default
                  sudo systemctl reload nginx

                  docker stop mylog-temp || true
                  docker rm mylog-temp || true

                  echo "🎉 성공적으로 배포했습니다!"
                else
                  echo "❌ Nginx 헬스체크에 실패했습니다 - 롤백합니다..."
                  sudo cp /etc/nginx/sites-available/default.backup /etc/nginx/sites-available/default
                  sudo systemctl reload nginx
                  docker stop mylog-new || true
                  docker rm mylog-new || true
                  exit 1
                fi
              else
                echo "❌ Nginx 설정 검증에 실패했습니다 - 롤백합니다..."
                sudo cp /etc/nginx/sites-available/default.backup /etc/nginx/sites-available/default
                docker stop mylog-new || true
                docker rm mylog-new || true
                exit 1
              fi
            else
              echo "❌ 새 컨테이너 헬스체크에 실패했습니다 - 롤백합니다..."
              docker stop mylog-new || true
              docker rm mylog-new || true
              exit 1
            fi

            # Clean up old images
            docker image prune -f
            docker images ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | tail -n +2 | sort -k2 -r | tail -n +4 | awk '{print $1}' | xargs -r docker rmi || true

            # Start local Redis if needed
            if [[ "${{ secrets.USE_LOCAL_REDIS }}" == "true" ]] && ! docker ps | grep -q redis; then
              docker run -d --name redis \
                -p 6379:6379 \
                -v redis-data:/data \
                --network nginx-network \
                --restart unless-stopped \
                --log-driver json-file \
                --log-opt max-size=50m \
                --log-opt max-file=3 \
                redis:alpine
              echo "🎉 성공적으로 Redis 컨테이너를 실행했습니다!"
            fi