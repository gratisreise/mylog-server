name: CI/CD for MyLog with Docker Compose

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mylog
  NGINX_CONFIG_PATH: /etc/nginx/conf.d/mylog.fyi.conf

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: ./gradlew test --parallel
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build application JAR
        run: ./gradlew clean bootJar -x test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker compose build
          docker compose push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # 🔹 GitHub Actions 러너 IP 동적 등록 및 AWS 설정
      - name: Get GitHub Actions runner public IP
        id: get_ip
        run: echo "MY_IP=$(curl -s checkip.amazonaws.com)/32" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.EC2_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.EC2_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Authorize SSH ingress for runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp --port 22 --cidr $MY_IP

      # 🔹 환경 변수 파일 생성
      - name: Create .env file for deployment
        run: |
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USER_NAME=${{ secrets.DB_USER_NAME }}" >> .env
          echo "DB_USER_PASSWORD=${{ secrets.DB_USER_PASSWORD }}" >> .env
          echo "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" >> .env
          echo "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" >> .env
          echo "ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}" >> .env
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
          echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
          echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "REDIRECT_URI=${{ secrets.REDIRECT_URI }}" >> .env
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}" >> .env

      # 🔹 EC2 서버에 파일 전송 및 배포
      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          source: ".env,compose.yaml"
          target: "~/"

      - name: Deploy and manage application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            LOG_FILE="/var/log/deployment.log"
            exec > >(sudo tee -a $LOG_FILE) 2>&1
            echo "Deployment started at $(date)"
            
            # Health check 함수 정의
            wait_for_health() {
              local port=$1
              local retries=30
              local delay=1
              echo "Waiting for service health check on port $port..."
              for ((i=1; i<=retries; i++)); do
                if curl -s "http://localhost:${port}/actuator/health" | grep -q "UP"; then
                  echo "✅ Health check passed on port $port"
                  return 0
                fi
                echo "⏳ Attempt $i/$retries: Service not healthy yet..."
                sleep $delay
              done
              echo "❌ Health check failed after $retries attempts"
              return 1
            }

            # Nginx 헬스 체크 함수 정의
            wait_for_nginx_health() {
              for i in {1..15}; do
                if curl -f https://mylog.fyi/actuator/health; then
                  return 0
                fi
                sleep 5
              done
              return 1
            }
            
            # Docker 로그인
            source .env
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            echo "Logged into Docker Hub."

            docker compose pull
            echo "Pulled latest Docker images."

            # 현재 Nginx가 바라보는 포트 확인
            CURRENT_PORT=$(sudo grep -oP 'server 127.0.0.1:\K[0-9]+' $NGINX_CONFIG_PATH | head -1)
            GREEN_PORT=8080
            BLUE_PORT=8081

            # 첫 배포 시 CURRENT_PORT가 비어있을 경우 기본 포트로 설정
            if [ -z "$CURRENT_PORT" ]; then
              TARGET_PORT=$GREEN_PORT
              CURRENT_CONTAINER_NAME=""
              NEW_CONTAINER_NAME=mylog-app
            elif [ "$CURRENT_PORT" -eq "$GREEN_PORT" ]; then
              TARGET_PORT=$BLUE_PORT
              CURRENT_CONTAINER_NAME=mylog-app
              NEW_CONTAINER_NAME=mylog-app-blue
            else
              TARGET_PORT=$GREEN_PORT
              CURRENT_CONTAINER_NAME=mylog-app-blue
              NEW_CONTAINER_NAME=mylog-app
            fi

            # 새로운 컨테이너 배포
            echo "Deploying new version on port $TARGET_PORT..."
            docker compose up -d $NEW_CONTAINER_NAME
            if ! wait_for_health $TARGET_PORT; then
              echo "New container health check failed. Deployment aborted."
              docker compose rm -f $NEW_CONTAINER_NAME
              exit 1
            fi

            # Nginx 포트 전환
            echo "Switching Nginx traffic to new container on port $TARGET_PORT..."
            sudo cp $NGINX_CONFIG_PATH $NGINX_CONFIG_PATH.bak
            sudo sed -i "s/\(server 127.0.0.1:\)[0-9]\+/\1$TARGET_PORT/" $NGINX_CONFIG_PATH
            
            if ! sudo nginx -t && sudo systemctl reload nginx; then
              echo "Nginx reload failed. Reverting to backup configuration."
              sudo mv $NGINX_CONFIG_PATH.bak $NGINX_CONFIG_PATH
              sudo nginx -t && sudo systemctl reload nginx
              docker compose rm -f $NEW_CONTAINER_NAME
              exit 1
            fi
            
            echo "Nginx switch successful. Checking application health via Nginx..."
            if ! wait_for_nginx_health; then
              echo "NGINX health check failed after switch. Reverting to backup."
              sudo mv $NGINX_CONFIG_PATH.bak $NGINX_CONFIG_PATH
              sudo nginx -t && sudo systemctl reload nginx
              docker compose rm -f $NEW_CONTAINER_NAME
              exit 1
            fi

            # 기존 컨테이너 정리 (첫 배포가 아닌 경우에만 실행)
            if [ -n "$CURRENT_CONTAINER_NAME" ]; then
              echo "Stopping and removing old container: $CURRENT_CONTAINER_NAME"
              docker compose stop $CURRENT_CONTAINER_NAME
              docker compose rm -f $CURRENT_CONTAINER_NAME
            fi

            # Nginx 백업 파일 삭제
            sudo rm -f $NGINX_CONFIG_PATH.bak
            
            # 정리 작업
            docker image prune -f
            rm -f .env compose.yaml
            echo "Deployment completed at $(date)"

      # 🔹 배포 완료 후 보안 그룹 규칙 제거
      - name: Revoke SSH ingress for runner IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp --port 22 --cidr $MY_IP