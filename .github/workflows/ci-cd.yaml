name: CI/CD for MyLog with GCP Blue-Green Deployment

#on:
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mylog-server
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  ZONE: asia-northeast3-a
  # 타임아웃 설정
  HEALTH_CHECK_TIMEOUT: 300
  DEPLOYMENT_TIMEOUT: 900

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --parallel --continue
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/reports/jacoco/
          retention-days: 7

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          
      - name: Build application JAR
        run: ./gradlew clean bootJar -x test --build-cache

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image with cache
        run: |
          # Docker 빌드 캐시 활용
          export DOCKER_BUILDKIT=1
          docker compose build --parallel
          docker compose push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          COMPOSE_DOCKER_CLI_BUILD: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 25
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest
          install_components: 'gcloud'

      - name: Setup network access
        id: network_setup
        run: |
          # IP 획득과 방화벽 규칙을 한 번에 처리
          MY_IP=$(curl -s --max-time 10 ifconfig.me)
          if [[ -z "$MY_IP" ]]; then
            echo "❌ Failed to get public IP"
            exit 1
          fi
          
          echo "MY_IP=$MY_IP" >> $GITHUB_ENV
          echo "🌐 Runner IP: $MY_IP"
          
          # 방화벽 규칙 생성 (기존 규칙 확인 후)
          RULE_NAME="github-runner-ssh-${{ github.run_id }}"
          if ! gcloud compute firewall-rules describe "$RULE_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            gcloud compute firewall-rules create "$RULE_NAME" \
              --allow tcp:22 \
              --source-ranges "$MY_IP/32" \
              --target-tags ssh-allowed \
              --description "Temporary SSH access for GitHub Actions runner" \
              --project="$GCP_PROJECT_ID"
            echo "✅ Firewall rule created: $RULE_NAME"
          else
            echo "ℹ️ Firewall rule already exists: $RULE_NAME"
          fi

      - name: Create deployment environment file
        run: |
          # 환경 변수 파일 생성 (보안 강화)
          cat > .env << 'EOF'
          # Database Configuration
          DB_URL=${{ secrets.DB_URL }}
          DB_USER_NAME=${{ secrets.DB_USER_NAME }}
          DB_USER_PASSWORD=${{ secrets.DB_USER_PASSWORD }}
          
          # AWS Configuration (S3)
          AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
          
          # JWT Secrets
          ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
          
          # OAuth2 Configuration
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
          
          # External Services
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          REDIRECT_URI=${{ secrets.REDIRECT_URI }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          
          # Docker Configuration
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
          EOF
          
          # 파일 권한 설정
          chmod 600 .env
          echo "✅ Environment file created with secure permissions"

      - name: Copy deployment files to GCE
        timeout-minutes: 5
        run: |
          # SSH 키 설정 (보안 강화)
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          # SSH 연결 테스트
          if ! ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
               -o ConnectTimeout=10 -o BatchMode=yes \
               ${{ secrets.GCE_USER }}@${{ secrets.GCE_EXTERNAL_IP }} "echo 'SSH connection test successful'"; then
            echo "❌ SSH connection failed"
            exit 1
          fi
          
          # 파일 전송 with progress
          echo "📤 Copying deployment files to GCE..."
          
          # 파일 존재 확인
          echo "🔍 Checking files before transfer..."
          ls -la .env compose.yaml ./prometheus.yml scripts/deploy-bluegreen.sh
          
          # 파일 전송
          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 -C \
              .env compose.yaml ./prometheus.yml scripts/deploy-bluegreen.sh \
              ${{ secrets.GCE_USER }}@${{ secrets.GCE_EXTERNAL_IP }}:~/
          
          echo "✅ Files copied successfully"

      - name: Deploy application with Blue-Green strategy
        timeout-minutes: 15
        run: |
          echo "🚀 Starting Blue-Green deployment on GCE..."
          
          # 배포 스크립트 실행 권한 부여 및 실행
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 -o ServerAliveInterval=10 \
              ${{ secrets.GCE_USER }}@${{ secrets.GCE_EXTERNAL_IP }} << ENDSSH
          
          # 스크립트 실행 권한 부여
          chmod +x ~/deploy-bluegreen.sh
          
          # 환경 변수 export (deploy-bluegreen.sh에서 Docker 로그인 처리)
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export DOCKER_PASSWORD="${{ secrets.DOCKER_PASSWORD }}"
          
          # Blue-Green 배포 스크립트 실행 (Docker 로그인, 이미지 pull, 정리 작업 포함)
          ~/deploy-bluegreen.sh
          
          ENDSSH
          
          echo "✅ Blue-Green deployment completed successfully"

      - name: Cleanup resources
        if: always()
        run: |
          echo "🧹 Cleaning up deployment resources..."
          
          # 방화벽 규칙 제거
          RULE_NAME="github-runner-ssh-${{ github.run_id }}"
          if gcloud compute firewall-rules describe "$RULE_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            gcloud compute firewall-rules delete "$RULE_NAME" \
              --quiet --project="$GCP_PROJECT_ID"
            echo "✅ Firewall rule removed: $RULE_NAME"
          else
            echo "ℹ️ Firewall rule not found or already removed: $RULE_NAME"
          fi
          
          # SSH 키 파일 제거
          rm -f /tmp/ssh_key
          
          # 환경 파일은 deploy-bluegreen.sh에서 처리됨
          
          echo "✅ Resource cleanup completed"