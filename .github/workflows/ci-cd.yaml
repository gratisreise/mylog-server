
name: CI/CD for MyLog with Docker Compose

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mylog
  NGINX_CONFIG: /etc/nginx/sites-available/default

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: ./gradlew test --parallel
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build application
        run: ./gradlew clean bootJar -x test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker-compose build springboot-app
          docker-compose push springboot-app
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      - name: Output image digest
        run: echo "Image digest: $(docker inspect --format='{{index .RepoDigests 0}}' ${{ secrets.DOCKER_USERNAME }}/mylog:latest)"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file
        run: |
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USER_NAME=${{ secrets.DB_USER_NAME }}" >> .env
          echo "DB_USER_PASSWORD=${{ secrets.DB_USER_PASSWORD }}" >> .env
          echo "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" >> .env
          echo "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" >> .env
          echo "ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}" >> .env
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
          echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
          echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
          echo "REDIRECT_URI=${{ secrets.REDIRECT_URI }}" >> .env
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # 에러 시 종료
            set -e
            
            # 로그 설정
            sudo touch /var/log/deployment.log
            sudo chmod 666 /var/log/deployment.log
            exec > >(tee -a /var/log/deployment.log) 2>&1
            echo "Deployment started at $(date)"
            
            # Docker 서비스 시작
            sudo systemctl start docker
            sudo systemctl enable docker
            
            # .env 파일 저장
            cat << 'EOF' > .env
            $(cat .env)
            EOF
            
            # Docker Compose 파일 복사
            cat << 'EOF' > docker-compose.yml
            $(cat docker-compose.yml)
            EOF
            test -s docker-compose.yml || { echo "Docker Compose file is empty"; exit 1; }
            
            # Docker Hub 로그인
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Redis 실행 확인
            if [ -z "$(docker ps -q -f name=redis)" ]; then
              docker-compose up -d redis:8.0.2-alpine
              echo "Redis started"
            fi
            
            # 초기 배포 확인
            if [ -z "$(docker ps -q -f name=springboot-app)" ]; then
              docker-compose up -d
              sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl reload nginx
              echo "Initial deployment completed"
              exit 0
            fi
            
            # 헬스체크 함수
            wait_for_health() {
              for i in {1..10}; do
                if curl -f http://localhost:$1/actuator/health; then
                  return 0
                fi
                sleep 10
              done
              return 1
            }
            wait_for_nginx_health() {
              for i in {1..15}; do
                if curl -f https://mylogging.click/actuator/health; then
                  return 0
                fi
                sleep 5
              done
              return 1
            }
            
            # 블루 배포
            docker-compose up -d --scale springboot-app-blue=1
            if ! wait_for_health 8081; then
              echo "Blue container health check failed"
              docker-compose rm -f springboot-app-blue
              exit 1
            fi
            
            # Nginx 포트 전환 (블루: 8081)
            sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak
            sudo sed -i 's/server 127.0.0.1:[0-9]\+/server 127.0.0.1:8081/' /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx
            if ! wait_for_nginx_health; then
              echo "Nginx health check failed"
              sudo mv /etc/nginx/sites-available/default.bak /etc/nginx/sites-available/default
              sudo nginx -t && sudo systemctl reload nginx
              docker-compose rm -f springboot-app-blue
              exit 1
            fi
            
            # 그린 컨테이너 교체
            docker-compose stop springboot-app
            docker-compose rm -f springboot-app
            docker-compose up -d springboot-app
            sudo sed -i 's/server 127.0.0.1:[0-9]\+/server 127.0.0.1:8080/' /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx
            
            # 정리
            docker image prune -f
            rm -f .env
            
            echo "Deployment completed at $(date)"
